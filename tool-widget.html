<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Công cụ tra cứu Thước Lỗ Ban | Nội Thất The One</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3fa;
    --panel:#ffffff;
    --ink:#102036;
    --muted:#5f6e82;
    --line:#dde6f1;
    --brand:#004ea8;
    --brand-2:#c8922e;
    --good:#c0392b;
    --good-bg:#fdecea;
    --bad:#2b2b2b;
    --bad-bg:#ecebea;
    --warn:#8a5a00;
    --warn-bg:#fbe9c9;
    --radius:14px;
    --shadow:0 8px 22px rgba(0,40,90,.08);
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Mulish","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding:16px;
  }
  a{color:var(--brand)}
  .ttl{font-size:15px;font-weight:800;margin:0 0 12px;color:var(--brand)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .input-card{padding:18px}
  .input-row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
  .field{flex:1 1 220px;min-width:200px}
  label.lbl{display:block;font-size:12.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
  .num-wrap{display:flex;align-items:stretch;border:1.5px solid var(--line);border-radius:11px;overflow:hidden;background:#fff;transition:border-color .15s}
  .num-wrap:focus-within{border-color:var(--brand-2)}
  .num-wrap input{flex:1;border:0;outline:0;font-size:22px;font-weight:700;padding:12px 14px;background:transparent;color:var(--ink);width:100%;min-width:0}
  .unit-toggle{display:flex;border-left:1px solid var(--line)}
  .unit-toggle button{border:0;background:#eef4fb;color:var(--muted);font-weight:700;font-size:13px;padding:0 13px;cursor:pointer;transition:.12s}
  .unit-toggle button+button{border-left:1px solid var(--line)}
  .unit-toggle button[aria-pressed="true"]{background:var(--brand);color:#fff}
  .hint{font-size:12.5px;color:var(--muted);margin-top:8px}

  #results{margin-top:8px}
  .summary-card{padding:16px 18px;margin-top:14px;border-top:4px solid var(--brand)}
  .summary-head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px}
  .summary-title{font-weight:800;font-size:15px}
  .summary-text{margin:10px 0 10px;font-size:13.5px;color:#2a3b54}
  .summary-list{margin:0;padding-left:18px;font-size:13px;color:var(--muted);display:grid;gap:4px}
  .summary-list li b{font-weight:800}
  .summary-list li.ok b{color:var(--good)}
  .summary-list li.no b{color:var(--bad)}

  .ruler-block{margin-top:12px;overflow:hidden}
  .ruler-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);background:#f4f8fd;flex-wrap:wrap}
  .ruler-title b{font-size:15px}
  .ruler-title span{color:var(--muted);font-size:12.5px}
  .verdict{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:13px;padding:6px 13px;border-radius:999px;white-space:nowrap}
  .verdict.good{color:#fff;background:var(--good)}
  .verdict.bad{color:#fff;background:var(--bad)}
  .verdict.warn{color:var(--warn);background:var(--warn-bg)}
  .verdict .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.85}

  .ruler-body{padding:14px 16px}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
  .meta-grid .mi{background:#f4f8fd;border:1px solid var(--line);border-radius:11px;padding:9px 11px}
  .meta-grid .mi i{font-style:normal;display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
  .meta-grid .mi b{font-size:14px}
  .meaning{font-size:13.5px;color:#2a3b54;background:#f7fafe;border-left:3px solid var(--brand-2);padding:9px 13px;border-radius:0 8px 8px 0}

  .scale{margin-top:14px}
  .scale-track{position:relative;display:flex;border-radius:9px;overflow:hidden;border:1px solid var(--line);height:60px}
  .seg{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;color:#fff;font-size:10.5px;font-weight:700;padding:4px 3px;line-height:1.2;overflow:hidden;border-right:1px solid rgba(255,255,255,.18)}
  .seg:last-child{border-right:0}
  .seg.good{background:linear-gradient(180deg,#d24a3b,#b5301f)}
  .seg.bad{background:linear-gradient(180deg,#3a3a3a,#222)}
  .seg.active{outline:3px solid var(--brand-2);outline-offset:-3px;z-index:2}
  .seg-name{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
  .seg small{opacity:.95;font-weight:800;display:inline-block;font-size:8.5px;letter-spacing:.06em;line-height:1;padding:3px 6px;border-radius:999px;background:rgba(255,255,255,.22)}
  .marker{position:absolute;top:-6px;bottom:-6px;width:2px;background:#1f6feb;z-index:5;pointer-events:none}
  .marker::before{content:"";position:absolute;top:-7px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1f6feb}
  .scale-cap{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:6px}

  .suggest{margin-top:12px;font-size:13px}
  .suggest .ttl2{font-weight:700;margin-bottom:8px;color:#2a3b54;font-size:13px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px solid var(--good);color:var(--good);background:var(--good-bg);border-radius:9px;padding:6px 11px;font-weight:700;cursor:pointer;font-size:12.5px;transition:.12s}
  .chip:hover{background:var(--good);color:#fff}
  .chip span{font-weight:500;opacity:.8;font-size:11px}

  .disclaimer{font-size:11.5px;color:var(--muted);margin-top:12px;font-style:italic}

  @media (max-width:480px){
    .seg{font-size:9px}
    .seg small{display:none}
    .num-wrap input{font-size:19px}
  }
</style>
</head>
<body>
  <p class="ttl">Tra cứu Thước Lỗ Ban — Nội Thất The One</p>

  <div class="card input-card">
    <div class="input-row">
      <div class="field">
        <label class="lbl" for="value">Kích thước cần đo</label>
        <div class="num-wrap">
          <input id="value" type="number" inputmode="decimal" min="0" step="1" placeholder="Ví dụ: 810" autocomplete="off">
          <div class="unit-toggle" role="group" aria-label="Đơn vị">
            <button type="button" data-unit="mm" aria-pressed="true">mm</button>
            <button type="button" data-unit="cm" aria-pressed="false">cm</button>
            <button type="button" data-unit="m" aria-pressed="false">m</button>
          </div>
        </div>
        <div class="hint">Mẹo: nhập số đo thực tế (lọt lòng đối với cửa). Bấm vào kích thước gợi ý màu đỏ để tự điền số đẹp.</div>
      </div>
    </div>
  </div>

  <section id="results" aria-live="polite"></section>
  <p class="disclaimer">* Quy ước màu: cung đỏ là cát lợi (nên chọn), cung đen là hung (nên tránh). Công cụ mang tính tham khảo phong thủy, không thay thế tính toán kết cấu.</p>

<script>
"use strict";
const RULERS = [
  {
    id:"loban52", name:"Thước 52.2cm", use:"Thông thủy — cửa, cửa sổ, cổng (khoảng rỗng/lọt lòng)", shortUse:"cửa, cửa sổ, cổng", cycle:522,
    cungs:[
      {name:"Quý Nhân", good:true,  meaning:"Gặp quý nhân phù trợ, làm ăn phát đạt, con cái hiếu thảo, thông minh.", subs:["Quyền Lộc","Trung Tín","Tác Quan","Phát Đạt","Thông Minh"]},
      {name:"Hiểm Họa", good:false, meaning:"Tai họa rình rập, trôi dạt tha hương, gia đình tán tài tán lộc.", subs:["Án Thành","Hỗn Nhân","Thất Hiếu","Tai Họa","Thường Bệnh"]},
      {name:"Thiên Tai", good:false, meaning:"Dễ ốm đau bệnh tật, hao người tốn của, tai ương bất ngờ.", subs:["Hoàn Tử","Quan Tài","Thân Tàn","Thất Tài","Hệ Quả"]},
      {name:"Thiên Tài", good:true,  meaning:"Tài lộc dồi dào, văn chương hiển đạt, thêm tài thêm lộc.", subs:["Thi Thư","Văn Học","Thanh Quý","Tác Lộc","Thiên Lộc"]},
      {name:"Phúc Lộc", good:true,  meaning:"Phúc lộc đầy nhà, phú quý song toàn, con cháu hiển vinh.", subs:["Trí Tồn","Phú Quý","Tiến Bửu","Thập Thiện","Văn Chương"]},
      {name:"Cô Độc", good:false, meaning:"Cô quạnh, ly tán, hao người, gia đạo bất hòa.", subs:["Bạc Nghịch","Vô Vọng","Ly Tán","Tửu Thực","Dâm Dục"]},
      {name:"Thiên Tặc", good:false, meaning:"Bệnh tật, tù ngục, mất của, tai họa do người ngoài.", subs:["Phong Bệnh","Chiêu Ôn","Ôn Tài","Ngục Tù","Quan Tài"]},
      {name:"Tể Tướng", good:true,  meaning:"Gia đạo hanh thông, công danh sự nghiệp, may mắn bất ngờ.", subs:["Đại Tài","Thi Thư","Hoạch Tài","Hiếu Tử","Quý Nhân"]}
    ]
  },
  {
    id:"loban42", name:"Thước 42.9cm", use:"Dương trạch — bệ bếp, bậc thang, khối xây dựng đặc", shortUse:"bậc thang, bệ bếp, khối xây", cycle:429,
    cungs:[
      {name:"Tài", good:true,  meaning:"Tiền của dồi dào, gia đạo thịnh vượng, của cải sung túc.", subs:["Tài Đức","Bảo Khố","Lục Hợp","Nghênh Phúc"]},
      {name:"Bệnh", good:false, meaning:"Bệnh tật, tổn thất tài chính, rắc rối kiện tụng.", subs:["Thoái Tài","Công Sự","Lao Chấp","Cô Quả"]},
      {name:"Ly", good:false, meaning:"Chia ly, mất mát, thất thoát, người nhà xa cách.", subs:["Trường Khố","Kiếp Tài","Quan Quỷ","Thất Thoát"]},
      {name:"Nghĩa", good:true,  meaning:"Việc nghĩa tốt đẹp, con cháu hiếu thuận, được quý nhân giúp.", subs:["Thêm Đinh","Ích Lợi","Quý Tử","Đại Cát"]},
      {name:"Quan", good:true,  meaning:"Thăng quan tiến chức, công danh hiển đạt, thu nhập tăng.", subs:["Thuận Khoa","Hoạnh Tài","Tiến Ích","Phú Quý"]},
      {name:"Kiếp", good:false, meaning:"Tai ương, trộm cắp, ly hương, hao tán tiền của.", subs:["Tử Biệt","Thoái Khẩu","Ly Hương","Tài Thất"]},
      {name:"Hại", good:false, meaning:"Tai họa, bệnh tật, thị phi khẩu thiệt.", subs:["Tai Chí","Tử Tuyệt","Bệnh Lâm","Khẩu Thiệt"]},
      {name:"Bản", good:true,  meaning:"Vững bền, đăng khoa, tiến bảo, gia đạo hưng vượng.", subs:["Tài Chí","Đăng Khoa","Tiến Bảo","Hưng Vượng"]}
    ]
  },
  {
    id:"loban38", name:"Thước 38.8cm", use:"Nội thất / Âm phần — bàn, tủ, giường, kệ, bàn thờ", shortUse:"bàn, tủ, giường, bàn thờ", cycle:388,
    cungs:[
      {name:"Đinh", good:true,  meaning:"Thêm đinh thêm phúc, con cháu đỗ đạt, tài vượng.", subs:["Phúc Tinh","Cập Đệ","Tài Vượng","Đăng Khoa"]},
      {name:"Hại", good:false, meaning:"Khẩu thiệt thị phi, bệnh tật, tử tuyệt, họa tới.", subs:["Khẩu Thiệt","Lâm Bệnh","Tử Tuyệt","Họa Chí"]},
      {name:"Vượng", good:true,  meaning:"Hưng vượng, hỷ sự liên tiếp, tiến bảo, thêm phúc.", subs:["Thiên Đức","Hỷ Sự","Tiến Bảo","Thêm Phúc"]},
      {name:"Khổ", good:false, meaning:"Thất thoát, quan quỷ, kiếp tài, không người nối dõi.", subs:["Thất Thoát","Quan Quỷ","Kiếp Tài","Vô Tự"]},
      {name:"Nghĩa", good:true,  meaning:"Đại cát, tài vượng, lợi ích, đầy kho lẫm.", subs:["Đại Cát","Tài Vượng","Lợi Ích","Thiên Khố"]},
      {name:"Quan", good:true,  meaning:"Phú quý, tài lộc, thuận khoa, tiến bảo.", subs:["Phú Quý","Tiến Bảo","Tài Lộc","Thuận Khoa"]},
      {name:"Tử", good:false, meaning:"Ly hương, tử biệt, thoát đinh, thất tài.", subs:["Ly Hương","Tử Biệt","Thoát Đinh","Thất Tài"]},
      {name:"Hưng", good:true,  meaning:"Đăng khoa, quý tử, thêm đinh, hưng vượng.", subs:["Đăng Khoa","Quý Tử","Thêm Đinh","Hưng Vượng"]},
      {name:"Thất", good:false, meaning:"Cô quả, lao chấp, công sự, thoát tài.", subs:["Cô Quả","Lao Chấp","Công Sự","Thoát Tài"]},
      {name:"Tài", good:true,  meaning:"Nghênh phúc, lục hợp, tiến bảo, tài đức vẹn toàn.", subs:["Nghênh Phúc","Lục Hợp","Tiến Bảo","Tài Đức"]}
    ]
  }
];

function lookup(ruler, mm){
  const cycle = ruler.cycle;
  const nSub = ruler.cungs.reduce((s,c)=>s+c.subs.length,0);
  const subW = cycle / nSub;
  let rem = mm % cycle;
  if (rem < 0) rem += cycle;
  const cycleIndex = Math.floor(mm / cycle);
  let subIdx = Math.floor(rem / subW);
  if (subIdx >= nSub) subIdx = nSub - 1;
  let acc = 0, cungIdx = 0, subInCung = 0;
  for (let i=0;i<ruler.cungs.length;i++){
    const len = ruler.cungs[i].subs.length;
    if (subIdx < acc + len){ cungIdx = i; subInCung = subIdx - acc; break; }
    acc += len;
  }
  const cung = ruler.cungs[cungIdx];
  return { cung, cungIdx, subInCung, subIdx, rem, cycleIndex, subName: cung.subs[subInCung], good: cung.good };
}

function nearestGood(ruler, mm, count){
  const res = [];
  const seen = new Set();
  for (let d=0; d<=ruler.cycle && res.length<count*3; d++){
    for (const cand of (d===0?[mm]:[mm-d, mm+d])){
      if (cand<=0 || seen.has(cand)) continue;
      seen.add(cand);
      if (lookup(ruler, cand).good){ res.push({mm:cand, diff:cand-mm}); }
      if (res.length>=count) break;
    }
    if (res.length>=count) break;
  }
  return res.slice(0,count).sort((a,b)=>a.mm-b.mm);
}

const resultsEl = document.getElementById("results");
const valueEl = document.getElementById("value");
let unit = "mm";

function toMM(v){ return unit==="mm"? v : unit==="cm"? v*10 : v*1000; }
function fmtMM(mm){
  const cm = mm/10;
  return `${mm.toLocaleString("vi-VN")} mm <span style="color:var(--muted);font-weight:500">(${cm.toLocaleString("vi-VN",{maximumFractionDigits:2})} cm)</span>`;
}

function segHTML(ruler, active){
  const nSub = ruler.cungs.reduce((s,c)=>s+c.subs.length,0);
  let html = '<div class="scale"><div class="scale-track">';
  ruler.cungs.forEach((c,ci)=>{
    const w = (c.subs.length/nSub*100).toFixed(4);
    const cls = (c.good?"good":"bad") + (ci===active.cungIdx?" active":"");
    html += `<div class="seg ${cls}" style="flex:0 0 ${w}%"><span class="seg-name">${c.name}</span><small>${c.good?"Tốt":"Xấu"}</small></div>`;
  });
  const left = (active.rem/ruler.cycle*100).toFixed(3);
  html += `<div class="marker" style="left:${left}%"></div>`;
  html += '</div>';
  html += `<div class="scale-cap"><span>0</span><span>Chu kỳ ${ruler.cycle/10} cm</span></div></div>`;
  return html;
}

function summaryHTML(mm, evals){
  const total = evals.length;
  const goodCount = evals.filter(e=>e.res.good).length;
  let verdictClass, verdictText;
  if (goodCount===total){ verdictClass="good"; verdictText="KÍCH THƯỚC ĐẸP"; }
  else if (goodCount===0){ verdictClass="bad"; verdictText="NÊN ĐỔI KÍCH THƯỚC"; }
  else { verdictClass="warn"; verdictText=`TỐT CHO ${goodCount}/${total} HẠNG MỤC`; }

  let conclusion;
  if (goodCount===total){
    conclusion = `Kích thước <b>${mm.toLocaleString('vi-VN')} mm</b> rơi vào cung tốt trên cả ${total} loại thước lỗ ban — phù hợp dùng cho hầu hết hạng mục, từ cửa, khối xây đến nội thất.`;
  } else if (goodCount===0){
    conclusion = `Kích thước <b>${mm.toLocaleString('vi-VN')} mm</b> rơi vào cung xấu trên cả ${total} loại thước — không nên sử dụng cho hạng mục nào. Hãy chọn một kích thước gợi ý (màu đỏ) trong từng thước bên dưới.`;
  } else {
    conclusion = `Kích thước <b>${mm.toLocaleString('vi-VN')} mm</b> tốt cho ${goodCount}/${total} loại thước nhưng xấu cho phần còn lại — nghĩa là <b>chỉ nên dùng cho đúng hạng mục tương ứng với loại thước ra cung tốt</b>. Xem chi tiết từng dòng bên dưới trước khi quyết định.`;
  }

  const lines = evals.map(({ruler:r, res})=>{
    const cls = res.good ? "ok" : "no";
    const verb = res.good ? "cung tốt — có thể dùng cho" : "cung xấu — nên tránh dùng cho";
    return `<li class="${cls}"><b>${r.name}</b>: ${verb} ${r.shortUse}.</li>`;
  }).join("");

  return `<div class="card summary-card">
    <div class="summary-head">
      <div class="summary-title">Kết luận cho kích thước ${fmtMM(mm)}</div>
      <div class="verdict ${verdictClass}"><span class="dot"></span>${verdictText}</div>
    </div>
    <p class="summary-text">${conclusion}</p>
    <ul class="summary-list">${lines}</ul>
  </div>`;
}

function render(){
  const raw = parseFloat(valueEl.value);
  if (isNaN(raw) || raw<=0){
    resultsEl.innerHTML = `<div class="card input-card" style="margin-top:14px;color:var(--muted)">Nhập một kích thước lớn hơn 0 để xem kết quả tra cứu.</div>`;
    return;
  }
  const mm = Math.round(toMM(raw)*1000)/1000;
  const evals = RULERS.map(r=>({ruler:r, res:lookup(r, mm)}));
  let html = summaryHTML(mm, evals);

  evals.forEach(({ruler:r, res})=>{
    const g = res.good;
    const sugg = g ? [] : nearestGood(r, Math.round(mm), 4);
    html += `<div class="card ruler-block">
      <div class="ruler-head">
        <div class="ruler-title"><b>${r.name}</b> &nbsp; <span>${r.use}</span></div>
        <div class="verdict ${g?'good':'bad'}"><span class="dot"></span>${g?'CUNG TỐT (ĐỎ)':'CUNG XẤU (ĐEN)'}</div>
      </div>
      <div class="ruler-body">
        <div class="meta-grid">
          <div class="mi"><i>Cung lớn</i><b>${res.cung.name}</b></div>
          <div class="mi"><i>Phân cung</i><b>${res.subName}</b></div>
          <div class="mi"><i>Chu kỳ thứ</i><b>${res.cycleIndex} &nbsp;<span style="color:var(--muted);font-weight:500;font-size:12px">(dư ${(res.rem).toFixed(1)} mm)</span></b></div>
        </div>
        <div class="meaning">${res.cung.meaning}</div>
        ${segHTML(r, res)}
        ${ sugg.length ? `<div class="suggest"><div class="ttl2">Kích thước đẹp gần nhất (bấm để chọn):</div><div class="chips">${
            sugg.map(s=>`<button type="button" class="chip" data-mm="${s.mm}">${s.mm.toLocaleString("vi-VN")} mm <span>(${s.diff>0?'+':''}${s.diff})</span></button>`).join("")
          }</div></div>` : `<div class="suggest"><div class="ttl2" style="color:var(--good)">✔ Kích thước này đã đẹp theo thước ${r.name.replace('Thước ','')}.</div></div>` }
      </div>
    </div>`;
  });
  resultsEl.innerHTML = html;

  resultsEl.querySelectorAll(".chip").forEach(ch=>{
    ch.addEventListener("click", ()=>{
      const v = parseFloat(ch.dataset.mm);
      valueEl.value = unit==="mm"? v : unit==="cm"? v/10 : v/1000;
      render();
    });
  });

  // báo chiều cao thực tế cho trang cha (nếu trang cha có gắn script lắng nghe) để auto-resize iframe
  try{
    window.parent.postMessage({ tlbHeight: document.documentElement.scrollHeight }, "*");
  }catch(e){}
}

valueEl.addEventListener("input", render);
document.querySelectorAll(".unit-toggle button").forEach(b=>{
  b.addEventListener("click", ()=>{
    const newUnit = b.dataset.unit;
    const cur = parseFloat(valueEl.value);
    if(!isNaN(cur)){
      const mm = toMM(cur);
      unit = newUnit;
      valueEl.value = unit==="mm"? mm : unit==="cm"? mm/10 : mm/1000;
    } else {
      unit = newUnit;
    }
    document.querySelectorAll(".unit-toggle button").forEach(x=>x.setAttribute("aria-pressed", x===b?"true":"false"));
    render();
  });
});

valueEl.value = 810;
render();
window.addEventListener("load", render);
</script>
</body>
</html>
